<style>
.certainty {
  display: none;
}

.hidden {
  display: none;
}
/* Add some basic styling for the table */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ddd;
  text-align: center;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #f2f2f2;
}

/* Define classes for different color ranges */
.red {
  background-color: red;
  color: white;
}

.green {
  background-color: green;
  color: white;
}

.odds {
  text-align: center; /* Centering the content of Odds column */
}

.warnings {
  text-align: center; /* Centering the content of Odds column */
}
ul {
    list-style-type: none; /* Remove default bullet points */
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #f1f1f1;
}
li {
    float: left;
}
li a {
    display: block;
    color: black;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
}
li a:hover {
    background-color: #ddd;
}
.active {
    background-color: #ccc;
}

</style>
<script>
window.addEventListener("DOMContentLoaded", (event) => {
  // Get all the elements with class "total-color"
  const totalCells = document.querySelectorAll(".total-color");

  // Loop through each "Total" cell and set background color based on the value gradient
  totalCells.forEach((cell) => {
    const value = parseFloat(cell.textContent);
    const gradientColor = calculateGradientColor(value);
    cell.style.backgroundColor = gradientColor;
  });

  // Get all the elements with class "team"
  const teamCells = document.querySelectorAll(".team");
  const certaintyCells = document.querySelectorAll(".certainty");

    // Loop through each "Team" cell and make the team with the largest certainty value bold
    teamCells.forEach((cell, index) => {
        // Get the certainty value by index
        const certaintyCell = certaintyCells[index];
        const [certainty1, certainty2] = certaintyCell.textContent.split(" vs ");


    // Extract values from certainty
    const value1 = parseFloat(certainty1);
    const value2 = parseFloat(certainty2);

    // Determine which team has the largest value and make it bold
    if (value1 > value2) {
        cell.innerHTML = `<strong>${cell.textContent.split(' vs ')[0]}</strong> vs ${cell.textContent.split(' vs ')[1]}`;
    } else if (value2 > value1) {
        cell.innerHTML = `${cell.textContent.split(' vs ')[0]} vs <strong>${cell.textContent.split(' vs ')[1]}</strong>`;
    }
  })


  // Get all the elements with class "result"
  const correctCells = document.querySelectorAll(".correct");
  // Loop through each "Result" cell and display checkmarks and crosses based on the result value
    correctCells.forEach((cell, index) => {
    const correctValue = parseFloat(cell.textContent);
    if (correctValue === 1.0) {
      cell.innerHTML = `<span class="green">&#10003;</span>`;
    } else if (correctValue === 0.0) {
      cell.innerHTML = `<span>&#10060;</span>`
    } else if (correctValue === 0.5) {
      cell.innerHTML = `<span style="color: orange; font-size: 36px;">&#x2043;</span>`; // Set the color to dark yellow using rgb
    } else {
       cell.innerHTML = `<span class="black"; font-size: 36px;>&#x2043;</span>`;
    }
  });
  // Function to calculate the gradient color
  function calculateGradientColor(value) {
    if (value <= 0) {
      return "red";
    } else if (value >= 2) {
      return "green";
    } else if (value < 0.7) {
      const red = 255;
      const green = 255 * (value * 2);
      return `rgb(${red}, ${green}, 0)`;
    } else if ((value >= 0.7) && (value<1.5)) {
      const red = 255 * (1 - (value - 0.7));
      const green = 255;
      return `rgb(${red}, ${green}, 0)`;
    } else if (value >= 1.5) {
        const green = 255 * (1 - (value - 1.5));
        return `rgb(0, ${green}, 0)`;
    }
  }
});
window.addEventListener("DOMContentLoaded", (event) => {
  // Get all the tabs
  const tabs = document.querySelectorAll("ul li a");

  // Function to handle tab click
  const handleTabClick = (event) => {
    // Remove "active" class from all tabs
    tabs.forEach(t => t.classList.remove("active"));
    // Add "active" class to the clicked tab
    event.target.classList.add("active");
  };

  // Loop through each tab
  tabs.forEach(tab => {
    // Add click event listener to each tab
    tab.addEventListener("click", handleTabClick);
    // Check if this tab should be active based on the current URL
    if (tab.href === window.location.href) {
      // If yes, add "active" class to the tab
      tab.classList.add("active");
    }
  });
});
</script>
